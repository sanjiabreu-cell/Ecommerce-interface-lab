<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Detail</title>
</head>
<body>
  <table>
    <tr><th>Specification</th><th>Details</th></tr>
    <tr><td>Weight</td><td>1 kg</td></tr>
    <tr><td>Color</td><td>Blue</td></tr>
    <!-- More specifications -->
  </table>

  <form>
    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity" value="1" min="1" />
    <button type="submit">Add to Cart</button>
  </form>

  <section>
    <h2>User Reviews</h2>
    <blockquote>
      <p>Great product, highly recommend!</p>
      <footer>- Alice</footer>
    </blockquote>
    <article>
      <p>Not as expected.</p>
      <footer>- Bob</footer>
    </article>
  </section>
</body>
</html>
