<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Listing</title>
</head>
<body>
  <main>
    <article>
      <img src="product1.jpg" alt="Product 1" />
      <p>Price: $19.99</p>
      <a href="detail.html">View Details</a>
    </article>

    <article>
      <img src="product2.jpg" alt="Product 2" />
      <p>Price: $29.99</p>
      <a href="detail.html">View Details</a>
    </article>
    <!-- Add more products as needed -->
  </main>

  <aside>
    <form>
      <fieldset>
        <legend>Filter Products</legend>
        <label><input type="checkbox" name="category" value="cat1" />Category 1</label><br/>
        <label><input type="checkbox" name="category" value="cat2" />Category 2</label><br/>

        <label><input type="radio" name="price" value="low" />Low Price</label><br/>
        <label><input type="radio" name="price" value="high" />High Price</label><br/>
      </fieldset>
    </form>
  </aside>
</body>
</html>
