<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Listing</title>
</head>
<body>
  <header>
    <h1>Product Listing</h1>
    <nav>
      <a href="index.html">Home</a> |
      <a href="shopping-cart.html">Cart</a> |
      <a href="user-account.html">Account</a>
    </nav>
  </header>

  <main>
    <section>
      <article>
        <img src="product1.jpg" alt="Product 1" />
        <p>Price: $19.99</p>
        <a href="product-detail.html">View Details</a>
      </article>

      <article>
        <img src="product2.jpg" alt="Product 2" />
        <p>Price: $29.99</p>
        <a href="product-detail.html">View Details</a>
      </article>
    </section>
  </main>

  <aside>
    <form action="#" method="GET">
      <fieldset>
        <legend>Filter Products</legend>
        <p><strong>Category</strong></p>
        <label><input type="checkbox" name="category" value="cat1" /> Category 1</label><br/>
        <label><input type="checkbox" name="category" value="cat2" /> Category 2</label><br/>
        <p><strong>Price</strong></p>
        <label><input type="radio" name="price" value="low" /> Low Price</label><br/>
        <label><input type="radio" name="price" value="high" /> High Price</label><br/>
      </fieldset>
      <button type="submit">Apply Filters</button>
    </form>
  </aside>

  <footer>
    <p>&copy; 2026 Product Store</p>
  </footer>
</body>
</html>
